name: Keep Render server alive

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 실행 (Render 무료 15분 슬립 방지)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://workping.onrender.com/health) || STATUS="timeout"
          echo "Health check status: $STATUS"
