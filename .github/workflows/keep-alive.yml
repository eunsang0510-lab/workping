name: Keep Render server alive

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 실행 (Render 무료 15분 슬립 방지)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://workping.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
